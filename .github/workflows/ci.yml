name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

      - run: pnpm test

      - name: Build the published bundle
        run: pnpm --filter line-bot-router build

      - name: publint (strict)
        run: pnpm --filter line-bot-router publint

      - name: Wrangler dry-run (template bundles)
        working-directory: templates/cloudflare-worker
        run: pnpm exec wrangler deploy --dry-run --outdir=.wrangler/dry-run
